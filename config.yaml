# =============================================================================
# Symplify Configuration
# =============================================================================
# Edit this file before running Symplify for the first time.
# Run `python run.py --check` to validate your configuration.
# =============================================================================

# Server settings
server:
  host: "127.0.0.1"       # Use 0.0.0.0 to allow network access
  port: 8080
  debug: false

# Job scheduler: "slurm", "pbs", "sge", or "local"
scheduler:
  type: "slurm"
  # SLURM-specific settings (ignored for other schedulers)
  slurm:
    gpu_partition: "gpu"
    cpu_partition: "cpu"
    account: ""            # Leave empty if not required
    extra_flags: ""        # e.g. "--qos=high"
  # PBS-specific settings
  pbs:
    gpu_queue: "gpu"
    cpu_queue: "cpu"
    extra_flags: ""
  # SGE-specific settings
  sge:
    gpu_queue: "gpu.q"
    cpu_queue: "cpu.q"
    extra_flags: ""
  # Local execution (no cluster) — runs jobs as subprocesses
  local:
    max_parallel_jobs: 2

# Conda environments
environments:
  rfd3: "rfd3"             # Environment with rf3, foundry, ligandmpnn, biotite
  bindcraft: "BindCraft"   # Environment with pyrosetta, colabdesign, freesasa
  base_module: "anaconda3/2025.12"  # Module to load before conda activate

# Tool paths
paths:
  # Model weights
  rfd3_weights:      "/path/to/foundry_weights/rfd3"
  rf3_weights:       "/path/to/foundry_weights/rf3"
  bindcraft_dir:     "/path/to/bindcraft/BindCraft"
  # CCD mirror for RF3
  ccd_mirror:        "/path/to/ccd/mirror"
  # Working directory for all Symplify jobs
  workspace:         "/path/to/symplify_workspace"
  # PESTO installation (for protein hotspot identification)
  pesto_dir:         "/path/to/pesto"    # Leave empty to skip PESTO

# Pipeline defaults (all overridable per-job via the UI)
defaults:
  n_designs:             10000    # RFD3 backbone designs
  mpnn_per_backbone:     8        # LigandMPNN sequences per backbone
  linker_repeats:        3        # (GGGGS)n repeats
  sasa_threshold:        30.0     # Å² — C-terminus accessibility
  distance_threshold:    15.0     # Å  — distance from interface
  iptm_threshold:        0.8
  ptm_threshold:         0.8
  rmsd_threshold:        2.5
  dg_threshold:          -20.0
  delta_unsat_threshold: 2

# Resource allocation per stage
resources:
  rfd3_generation:
    gpus:    1
    cpus:    8
    mem_gb:  64
    hours:   24
  rf3_scoring:
    gpus:    1
    cpus:    8
    mem_gb:  64
    hours:   24
  post_processing:
    gpus:    0
    cpus:    32
    mem_gb:  128
    hours:   12
  bindcraft:
    gpus:    1
    cpus:    8
    mem_gb:  64
    hours:   48
  bindcraft_post:
    gpus:    0
    cpus:    16
    mem_gb:  64
    hours:   6
